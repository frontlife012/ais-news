# 6時間ごとにニュースを収集・翻訳して docs/data/articles.json を更新するワークフロー
# GitHub Pages(main ブランチ /docs 配信)なので、コミットすると自動でサイトに反映される
name: Update news

on:
  schedule:
    - cron: '15 */6 * * *'   # 6時間ごと(UTC)
  workflow_dispatch:          # Actionsタブから手動実行も可能

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch and translate news
        run: node fetcher.js

      - name: Commit updated articles
        run: |
          git config user.name "ais-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/articles.json
          git diff --cached --quiet || git commit -m "ニュース自動更新 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
